# Keep dependencies current so the repo reads as actively maintained.
# Dependabot opens PRs; CI (build + tests) gates them like any other change.
#
# Updates are GROUPED: without grouping, every coordinate gets its own PR, which
# means ~10 PRs a week, each running a full `mvn -B verify`, and every merge
# rebases the rest. Grouped PRs also prove the combination builds, which a pile of
# individually-green PRs never does.
version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    groups:
      build-plugins:
        patterns: ["org.apache.maven.plugins:*"]
      test-libs:
        patterns: ["org.junit*", "org.assertj:*", "org.mockito:*"]
      # The OpenTelemetry artifacts are all-or-nothing: the API, SDK, BOM and
      # exporters are version-locked, and a split bump yields a classpath where
      # the SDK and API disagree. Keep the family in one PR — same reasoning that
      # made a half-bumped fabric8 a bug in agent-operator.
      opentelemetry:
        patterns: ["io.opentelemetry:*", "io.opentelemetry.*:*"]
      runtime-libs:
        patterns: ["com.fasterxml.jackson*", "tools.jackson*", "org.springframework*"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels: ["dependencies"]
    groups:
      github-actions:
        patterns: ["*"]
  - package-ecosystem: "docker"
    directory: "/demo-agent"
    schedule:
      interval: "weekly"
    labels: ["dependencies"]
    ignore:
      # The build stage (maven:*-eclipse-temurin-N) and the runtime stage
      # (eclipse-temurin:N-jre) must move together and deliberately. A lone major
      # bump builds on JDK N+1 while still running on JDK N, and swaps a pinned
      # maven tag for a floating one.
      - dependency-name: "maven"
        update-types: ["version-update:semver-major"]
