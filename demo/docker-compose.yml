# agent-meter demo stack: OTLP -> Collector -> Prometheus (metrics) + Tempo (traces) -> Grafana.
# The demo-app runs on the HOST and exports OTLP to localhost:4317.
#
#   docker compose up -d
#   (cd .. && mvn -q -pl demo-app spring-boot:run)     # in another shell
#   ./load.sh
#   open http://localhost:3000   (anonymous admin; the agent-meter dashboard is provisioned)
services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.0
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otel-collector.yaml
    ports:
      - "4317:4317"   # OTLP gRPC (demo-app exports here)
      - "4318:4318"   # OTLP HTTP
    depends_on: [tempo, prometheus]

  tempo:
    image: grafana/tempo:2.6.1
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml
    ports:
      - "3200:3200"

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--enable-feature=exemplar-storage"   # so cost spikes link to traces
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  # The REAL instrumented agent (spring-ai-agent-starter + meter-starter). Only starts
  # with `docker compose --profile real up` AND an ANTHROPIC_API_KEY — then the dashboard
  # shows real token/cost data. Without it, use the keyless synthetic demo-app (see README).
  agent:
    profiles: ["real"]
    build:
      context: ..
      dockerfile: demo-agent/Dockerfile
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    ports:
      - "8086:8086"
    depends_on: [otel-collector]

  grafana:
    image: grafana/grafana:11.3.1
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3000:3000"
    depends_on: [prometheus, tempo]
